<!doctype html>
<html lang="en">
  <head>
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta charset="UTF-8" />

    <base href="./" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon.16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="./favicon.48.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="./favicon.64.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="128x128"
      href="./favicon.128.png"
    />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>The Devil's Machine</title>

    <meta
      name="description"
      content="You are imprisoned. The Devil offered you a deal: a great power… at a terrible cost.
Now, every action you take is determined by a slot machine.
Will you escape his prison and reclaim your freedom?"
    />

    <link rel="preload" as="image" href="./images/characters/knight.png" />
    <link rel="preload" as="image" href="./images/machine-borders.png" />
    <link rel="preload" as="image" href="./images/reel.png" />
    <link rel="preload" as="image" href="./images/separator.png" />
    <link rel="preload" as="image" href="./images/slots/sword.png" />
    <link rel="preload" as="image" href="./images/slots/shield.png" />
    <link rel="preload" as="image" href="./images/scenes/battle.png" />
  </head>
  <body>
    <div id="root"></div>
    <audio id="audio-title" loop preload="auto">
      <source src="./audio/musics/title.ogg" type="audio/ogg" />
      <source src="./audio/musics/title.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-battle" loop preload="auto">
      <source src="./audio/musics/battle.ogg" type="audio/ogg" />
      <source src="./audio/musics/battle.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-shop" loop preload="auto">
      <source src="./audio/musics/shop.ogg" type="audio/ogg" />
      <source src="./audio/musics/shop.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-gameover" loop preload="auto">
      <source src="./audio/musics/gameover.ogg" type="audio/ogg" />
      <source src="./audio/musics/gameover.mp3" type="audio/mpeg" />
    </audio>

    <audio id="audio-sound-accept-deal" preload="auto">
      <source src="./audio/sounds/accept_deal.ogg" type="audio/ogg" />
      <source src="./audio/sounds/accept_deal.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-active-cursed-symbol" preload="auto">
      <source src="./audio/sounds/active_cursed_symbol.ogg" type="audio/ogg" />
      <source src="./audio/sounds/active_cursed_symbol.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-active-symbol" preload="auto">
      <source src="./audio/sounds/active_symbol.ogg" type="audio/ogg" />
      <source src="./audio/sounds/active_symbol.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-click" preload="auto">
      <source src="./audio/sounds/click.ogg" type="audio/ogg" />
      <source src="./audio/sounds/click.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-curse-symbol" preload="auto">
      <source src="./audio/sounds/curse_symbol.ogg" type="audio/ogg" />
      <source src="./audio/sounds/curse_symbol.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-heal" preload="auto">
      <source src="./audio/sounds/heal.ogg" type="audio/ogg" />
      <source src="./audio/sounds/heal.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-hit" preload="auto">
      <source src="./audio/sounds/hit.ogg" type="audio/ogg" />
      <source src="./audio/sounds/hit.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-insert-symbol" preload="auto">
      <source src="./audio/sounds/insert_symbol.ogg" type="audio/ogg" />
      <source src="./audio/sounds/insert_symbol.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-lock" preload="auto">
      <source src="./audio/sounds/lock.ogg" type="audio/ogg" />
      <source src="./audio/sounds/lock.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-remove-symbol" preload="auto">
      <source src="./audio/sounds/remove_symbol.ogg" type="audio/ogg" />
      <source src="./audio/sounds/remove_symbol.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-spin" preload="auto">
      <source src="./audio/sounds/spin.ogg" type="audio/ogg" />
      <source src="./audio/sounds/spin.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-start-spin" preload="auto">
      <source src="./audio/sounds/start_spin.ogg" type="audio/ogg" />
      <source src="./audio/sounds/start_spin.mp3" type="audio/mpeg" />
    </audio>
    <audio id="audio-sound-stop-spin" preload="auto">
      <source src="./audio/sounds/stop_spin.ogg" type="audio/ogg" />
      <source src="./audio/sounds/stop_spin.mp3" type="audio/mpeg" />
    </audio>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
